{{- range $name, $operator := .Values.operators }}
{{- if and (eq (default "Automatic" $operator.installPlanApproval) "Manual") $operator.version }}
{{- $namespace := $operator.namespace }}
{{- $version := $operator.version }}
{{- $jobName := printf "%s-approve-%s" $name $version | replace "." "-" | lower | trunc 63 | trimSuffix "-" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ printf "%s-installplan-approver" $name | quote }}
  namespace: {{ $namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-installplan-approver" $name | quote }}
  namespace: {{ $namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["operators.coreos.com"]
    resources: ["installplans"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-installplan-approver" $name | quote }}
  namespace: {{ $namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-installplan-approver" $name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-installplan-approver" $name | quote }}
    namespace: {{ $namespace | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName | quote }}
  namespace: {{ $namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Auto-delete 10 minutes after completion so old version Jobs don't pile up.
  ttlSecondsAfterFinished: 600
  # Retry a handful of times to ride out transient API errors.
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: {{ printf "%s-installplan-approver" $name | quote }}
      restartPolicy: OnFailure
      containers:
        - name: approve
          image: {{ $.Values.kubectlImage | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -c
            - |
              TARGET={{ $version | quote }}
              NS={{ $namespace | quote }}

              for attempt in $(seq 1 30); do
                echo "[${attempt}/30] Looking for InstallPlan for ${TARGET}..."

                MATCHES=$(kubectl get installplan -n "${NS}" \
                  -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.clusterServiceVersionNames[*]}{"\n"}{end}' \
                  | grep "${TARGET}" | cut -f1)

                if [ -n "${MATCHES}" ]; then
                  for IP in ${MATCHES}; do
                    kubectl patch installplan "${IP}" -n "${NS}" \
                      --type=merge -p '{"spec":{"approved":true}}'
                    echo "Approved ${IP}"
                  done
                  exit 0
                fi

                sleep 10
              done

              # No matching InstallPlan found. Warn if other InstallPlans exist in the
              # namespace — that likely means the version field is wrong or out of date.
              OTHERS=$(kubectl get installplan -n "${NS}" \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.clusterServiceVersionNames[*]}{"\n"}{end}')
              if [ -n "${OTHERS}" ]; then
                echo "WARNING: no InstallPlan found for ${TARGET}, but others exist in ${NS}:"
                echo "${OTHERS}"
              fi
              exit 0
{{- end }}
{{- end }}
