{{- range .Values.operators }}
{{- if .createOperatorGroup }}
{{- $scope := default "Cluster" .scope }}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ printf "%s-operator-group" .name | quote }}
  namespace: {{ .namespace | quote }}
spec:
  {{- if eq $scope "Namespaced" }}
  targetNamespaces:
    {{- if .targetNamespaces }}
    {{- toYaml .targetNamespaces | nindent 4 }}
    {{- else }}
    - {{ .namespace | quote }}
    {{- end }}
  {{- else }}
  {} {{- /* Cluster scope: omit targetNamespaces so the operator watches all namespaces. */}}
  {{- end }}
{{- end }}
{{- end }}
